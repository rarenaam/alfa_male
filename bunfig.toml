[install]
saveTextLockfile = true
# 24h supply-chain guard: skip package versions published less than a day ago.
minimumReleaseAge = 86400
# Each entry bypasses the 24h guard for one package — confirm with the user
# before adding any.
minimumReleaseAgeExcludes = ["@lovable.dev/vite-tanstack-config", "@lovable.dev/mcp-js", "@lovable.dev/vite-plugin-dev-server-bridge", "@lovable.dev/vite-plugin-hmr-gate", "@lovable.dev/email-js", "@lovable.dev/webhooks-js"]

# SECURITY BEST PRACTICES FOR BUNFIG.TOML:
# 1. Never commit .env files - ensure they're in .gitignore
# 2. Use separate .env files for different environments (.env.development, .etc)
# 3. Regularly audit dependencies with: bun audit
# 4. Keep dependencies updated to get security patches
# 5. Consider using a software bill of materials (SBOM) tool for compliance

[security]
# Note: Bun doesn't have built-in security config in bunfig.toml
# These are recommendations for your project setup:
#
# Environment Variables:
#   - Never hardcode secrets in code or config files
#   - Use environment variables for all sensitive data
#   - Validate all environment variables at startup
#
# Dependency Security:
#   - Run `bun audit` regularly to check for vulnerabilities
#   - Keep all dependencies up to date
#   - Consider using a lockfile for consistent builds
#
# Build Security:
#   - Ensure production builds are optimized and minified
#   - Remove debug information from production builds
#   - Use content security policies in your server configuration
#
# Runtime Security:
#   - Implement rate limiting on your server
#   - Use proper CORS policies
#   - Set security headers (X-Frame-Options, X-Content-Type-Options, etc.)
#   - Validate and sanitize all user inputs